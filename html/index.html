<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Головна сторінка</title>
    <link rel="stylesheet" href="/style/styles.css">
</head>

<body>

    <div class="wrapper">

        <!--  Шапка и Навигация -->
        <header class="sidebar">
            <div class="logo">Anime<span>catalog</span></div>

            <nav class="main-nav">
                <h3 class="nav-title">Навігація по сайту</h3>
                <ul class="nav-list">
                    <li><a href="#" class="active">Головна</a></li>
                    <li><a href="#">Про нас</a></li>
                    <li><a href="#">Контакти</a></li>
                </ul>
            </nav>
        </header>

        <!-- Основной контент -->
        <div class="main-wrapper">
            <main class="main-content">
                <h1 class="page-title">Каталог аніме</h1>

                <div class="filter-buttons">
                    <button class="btn-filter active" data-genre="all">Всі</button>
                    <button class="btn-filter" data-genre="1">Екшн</button>
                    <button class="btn-filter" data-genre="8">Драма</button>
                    <button class="btn-filter" data-genre="2">Пригоди</button>
                    <button class="btn-filter" data-genre="10">Фантастика</button>
                    <button class="btn-filter" data-genre="popular">Популярні</button>
                </div>

                <div id="anime-grid" class="anime-grid">

                </div>
            </main>

            <!-- Подвал  -->
            <footer class="site-footer">
                <p>&copy; 2026 Animecatalog. Всі права захищені.</p>
            </footer>
        </div>

    </div>

    <script src="/java_s/main.js"></script>
</body>

</html>
